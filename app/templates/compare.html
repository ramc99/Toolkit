{% extends 'base.html' %}
{% block title %}Compare PDFs{% endblock %}
{% block content %}

<div class="mb-6 flex items-center gap-2">
    <a href="/" class="text-sm text-gray-400 hover:text-[#4a6cf7] transition-colors"><i class="fa-solid fa-chevron-left mr-1 text-xs"></i>Back</a>
    <span class="text-gray-300 dark:text-gray-600">/</span>
    <span class="text-sm text-gray-600 dark:text-gray-300 font-medium">Compare PDFs</span>
</div>

<div class="max-w-xl">
    <h1 class="text-xl font-bold mb-1">Compare PDFs</h1>
    <p class="text-sm text-gray-500 dark:text-gray-400 mb-6">Upload two PDFs to compare them.</p>

    <form method="post" enctype="multipart/form-data"
          class="bg-white dark:bg-gray-800 border border-slate-200 dark:border-gray-700 rounded-2xl shadow-sm p-6 space-y-4">

        <div>
            <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-1.5">First PDF</label>
            <div class="file-zone">
                <input type="file" name="file1" accept=".pdf" required>
                <div class="text-2xl text-gray-400 mb-1"><i class="fa-regular fa-file-pdf"></i></div>
                <div class="text-xs text-gray-400"><strong class="text-[#4a6cf7]">Click to browse</strong> or drag &amp; drop</div>
            </div>
            <p class="file-name text-xs text-gray-500 dark:text-gray-400 mt-1 min-h-4"></p>
        </div>

        <div>
            <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-1.5">Second PDF</label>
            <div class="file-zone">
                <input type="file" name="file2" accept=".pdf" required>
                <div class="text-2xl text-gray-400 mb-1"><i class="fa-regular fa-file-pdf"></i></div>
                <div class="text-xs text-gray-400"><strong class="text-[#4a6cf7]">Click to browse</strong> or drag &amp; drop</div>
            </div>
            <p class="file-name text-xs text-gray-500 dark:text-gray-400 mt-1 min-h-4"></p>
        </div>

        <button type="submit" class="btn btn-primary btn-full">
            <i class="fa-solid fa-code-compare"></i> Compare
        </button>
    </form>

    {% if result %}
    <div class="mt-5 bg-white dark:bg-gray-800 border border-slate-200 dark:border-gray-700 rounded-2xl shadow-sm p-5">
        <h2 class="text-sm font-semibold text-gray-600 dark:text-gray-300 mb-2 flex items-center gap-2">
            <i class="fa-solid fa-chart-bar text-cyan-500"></i> Result
        </h2>
        <p class="text-sm text-gray-700 dark:text-gray-300">{{ result }}</p>
    </div>
    {% endif %}
</div>
{% endblock %}
