{% extends 'base.html' %}
{% block title %}PDF Security{% endblock %}
{% block content %}

<div class="mb-6 flex items-center gap-2">
    <a href="/" class="text-sm text-gray-400 hover:text-[#4a6cf7] transition-colors"><i class="fa-solid fa-chevron-left mr-1 text-xs"></i>Back</a>
    <span class="text-gray-300 dark:text-gray-600">/</span>
    <span class="text-sm text-gray-600 dark:text-gray-300 font-medium">PDF Security</span>
</div>

<div class="max-w-xl">
    <h1 class="text-xl font-bold mb-1">PDF Security</h1>
    <p class="text-sm text-gray-500 dark:text-gray-400 mb-6">Password-protect a PDF or remove its password.</p>

    <form method="post" enctype="multipart/form-data"
          class="bg-white dark:bg-gray-800 border border-slate-200 dark:border-gray-700 rounded-2xl shadow-sm p-6 space-y-4">

        <div>
            <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-2">Action</label>
            <div class="flex gap-4">
                <label class="flex items-center gap-2 text-sm cursor-pointer">
                    <input type="radio" name="action" value="protect" checked class="accent-[#4a6cf7]"> Protect
                </label>
                <label class="flex items-center gap-2 text-sm cursor-pointer">
                    <input type="radio" name="action" value="unlock" class="accent-[#4a6cf7]"> Unlock
                </label>
            </div>
        </div>

        <div>
            <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-1.5">PDF File</label>
            <div class="file-zone">
                <input type="file" name="file" accept=".pdf" required>
                <div class="text-2xl text-gray-400 mb-1"><i class="fa-regular fa-file-pdf"></i></div>
                <div class="text-xs text-gray-400"><strong class="text-[#4a6cf7]">Click to browse</strong> or drag &amp; drop &mdash; .pdf only</div>
            </div>
            <p class="file-name text-xs text-gray-500 dark:text-gray-400 mt-1 min-h-4"></p>
        </div>

        <div>
            <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-1.5">Password</label>
            <input type="password" name="password" required placeholder="Enter password"
                class="w-full px-3 py-2 text-sm border border-slate-200 dark:border-gray-600 rounded-lg bg-slate-50 dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-[#4a6cf7]/30 focus:border-[#4a6cf7]">
        </div>

        <button type="submit" class="btn btn-primary btn-full">
            <i class="fa-solid fa-shield-halved"></i> Submit
        </button>
    </form>
</div>
{% endblock %}
