<% extends 'base.html' %>
<% block content %>
    <h2>Split a CSV into multiple files</h2>
    <form action="{{ url_for('main.split_csv_route') }}" method="post" enctype="multipart/form-data">
        <label for="file">CSV file:</label>
        <input type="file" name="file" id="file" accept=".csv" required>
        <label for="row_count">Rows per split (default 1000, minimum 10):</label>
        <input type="number" name="row_count" id="row_count" min="10" placeholder="1000">
        <button type="submit">Split CSV</button>
    </form>

    <h2>Merge multiple CSV/TSV files</h2>
    <form action="{{ url_for('main.merge_csv_route') }}" method="post" enctype="multipart/form-data">
        <label for="files">Select files (CSV or TSV):</label>
        <input type="file" name="files" id="files" accept=".csv,.tsv" multiple required>
        <label for="format">Output format:</label>
        <select name="format" id="format">
            <option value="csv" selected>CSV (default)</option>
            <option value="tsv">TSV</option>
            <option value="pdf">PDF</option>
        </select>
        <button type="submit">Merge Files</button>
    </form>
<% endblock %>
