<!DOCTYPE html>
<html lang="en" id="html-root">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invoice Maker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { brand: { DEFAULT: '#2d5986', light: '#eaf0f7', border: '#b8cfe8' } },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    html, body { height: 100%; overflow: hidden; transition: background .2s, color .2s; }
    .scrollpane { overflow-y: auto; height: calc(100vh - 56px); }

    .tcard { transition: border-color .15s, box-shadow .15s; cursor: pointer; }
    .tcard:hover { border-color: #93b8d8 !important; box-shadow: 0 1px 6px rgba(45,89,134,.12); }
    .tcard.active { border-color: #2d5986 !important; box-shadow: 0 0 0 2px #2d598622; }
    .tcard.active .tcard-label { color: #2d5986; font-weight: 600; }

    .field-input {
      width: 100%; border: 1px solid #cbd5e1; border-radius: 8px;
      padding: 8px 12px; font-size: 13px; color: #1e293b; outline: none;
      transition: border-color .15s, box-shadow .15s, background .2s, color .2s;
      background: #fff;
    }
    .field-input:focus { border-color: #2d5986; box-shadow: 0 0 0 3px rgba(45,89,134,.1); }
    .field-label { font-size: 12px; font-weight: 500; color: #64748b; margin-bottom: 4px; display: block; }

    #preview-wrapper { background: #dde3ea; padding: 20px 16px; overflow-y: auto; height: calc(100vh - 56px); }
    #preview-paper { background: white; box-shadow: 0 4px 24px rgba(0,0,0,.18); border-radius: 2px; width: 100%; max-width: 640px; margin: 0 auto; overflow: hidden; position: relative; }
    #preview-frame { width: 794px; height: 1060px; border: none; display: block; transform-origin: top left; }
    .preview-overlay { position: absolute; inset: 0; background: rgba(255,255,255,.65); display: flex; align-items: center; justify-content: center; backdrop-filter: blur(2px); pointer-events: none; opacity: 0; transition: opacity .2s; }
    .preview-overlay.visible { opacity: 1; }

    .mock-line { background: #d1d9e0; border-radius: 2px; }
    .mock-accent { background: #2d5986; border-radius: 2px; }

    /* Line items table */
    .item-row td { padding: 4px 4px; vertical-align: middle; }
    .item-row input { font-size: 13px; }
    .remove-row-btn {
      width: 24px; height: 24px; border-radius: 6px; border: 1px solid #e2e8f0;
      background: transparent; cursor: pointer; color: #94a3b8; display: flex;
      align-items: center; justify-content: center; flex-shrink: 0; transition: background .15s, color .15s;
    }
    .remove-row-btn:hover { background: #fee2e2; border-color: #fca5a5; color: #ef4444; }

    html.dark body                          { background: #09090b !important; color: #f4f4f5 !important; }
    html.dark header.h-14                   { background: #111113 !important; border-color: #27272a !important; }
    html.dark aside.w-48                    { background: #111113 !important; border-color: #27272a !important; }
    html.dark .bg-white                     { background: #18181b !important; }
    html.dark .bg-slate-100                 { background: #09090b !important; }
    html.dark .bg-slate-50                  { background: #111113 !important; }
    html.dark .border-slate-200             { border-color: #27272a !important; }
    html.dark .border-slate-100             { border-color: #27272a !important; }
    html.dark .text-slate-800,
    html.dark .text-slate-700               { color: #f4f4f5 !important; }
    html.dark .text-slate-600,
    html.dark .text-slate-500,
    html.dark .text-slate-400               { color: #a1a1aa !important; }
    html.dark .field-input                  { background: #1c1c1f !important; border-color: #3f3f46 !important; color: #f4f4f5 !important; }
    html.dark .field-label                  { color: #a1a1aa !important; }
    html.dark .tcard                        { background: #18181b !important; border-color: #27272a !important; }
    html.dark .mock-line                    { background: #3f3f46 !important; }
    html.dark #preview-wrapper              { background: #1c1c1f !important; }
    html.dark .item-row td                  { border-color: #27272a !important; }
    html.dark #items-table thead th         { color: #a1a1aa !important; border-color: #27272a !important; }
    html.dark .remove-row-btn              { border-color: #3f3f46 !important; color: #71717a !important; }
    html.dark .remove-row-btn:hover        { background: #3f1212 !important; border-color: #7f1d1d !important; color: #f87171 !important; }

    #theme-btn {
      width: 32px; height: 32px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid #e2e8f0; background: transparent; cursor: pointer; color: #94a3b8;
      transition: background .15s, color .15s; flex-shrink: 0;
    }
    #theme-btn:hover { background: rgba(99,102,241,.1); color: #6366f1; }
  </style>
</head>
<body class="font-sans antialiased">

  <header class="h-14 bg-white border-b border-slate-200 flex items-center px-5 gap-4 shrink-0 z-10 relative">
    <div class="flex items-center gap-3">
      <a href="/" class="flex items-center gap-1.5 text-xs text-slate-400 hover:text-slate-700 transition border border-slate-200 rounded-lg px-2.5 py-1.5">
        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
        </svg>
        Toolkit
      </a>
      <div class="flex items-center gap-2">
        <svg class="w-5 h-5 text-brand" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/>
        </svg>
        <span class="font-semibold text-slate-800 text-[15px] tracking-tight">Invoice Maker</span>
      </div>
    </div>
    <div class="ml-auto flex items-center gap-2">
      <button id="theme-btn" onclick="toggleTheme()">
        <svg id="theme-icon-moon" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/>
        </svg>
        <svg id="theme-icon-sun" class="w-4 h-4 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M12 7a5 5 0 100 10 5 5 0 000-10z"/>
        </svg>
      </button>
      <div id="preview-status" class="text-xs text-slate-400 mr-1 hidden">Updating…</div>
      <button onclick="updatePreview()"
        class="flex items-center gap-1.5 px-3.5 py-1.5 rounded-lg border border-slate-200 bg-white hover:bg-slate-50 text-slate-600 text-sm font-medium transition">
        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
        </svg>
        Refresh Preview
      </button>
      <button onclick="downloadPDF()" id="dl-btn"
        class="flex items-center gap-1.5 px-3.5 py-1.5 rounded-lg bg-brand hover:bg-brand/90 text-white text-sm font-medium transition shadow-sm">
        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
        </svg>
        Download PDF
      </button>
    </div>
  </header>

  <div class="flex" style="height: calc(100vh - 56px)">

    <!-- Template sidebar -->
    <aside class="w-48 shrink-0 bg-white border-r border-slate-200 scrollpane py-4 px-3">
      <p class="text-[11px] font-semibold uppercase tracking-widest text-slate-400 mb-3 px-1">Templates</p>

      <!-- Classic card -->
      <div class="tcard rounded-xl border-2 border-slate-200 p-2.5 mb-3 active"
           id="tcard-classic" onclick="selectTemplate('classic')">
        <div class="bg-slate-50 rounded-lg p-2 mb-2">
          <div class="flex flex-col gap-0.5">
            <div class="flex justify-between items-end mb-0.5">
              <div class="mock-line h-1.5 w-10"></div>
              <div class="mock-accent h-1 w-6 rounded-sm opacity-80"></div>
            </div>
            <div class="mock-accent h-px w-full my-0.5"></div>
            <div class="flex justify-between mt-0.5">
              <div class="mock-line h-0.5 w-12 opacity-60"></div>
              <div class="mock-line h-0.5 w-8 opacity-60"></div>
            </div>
            <div class="mock-line h-0.5 w-full opacity-40 mt-1"></div>
            <div class="mock-line h-0.5 w-4/5 opacity-35"></div>
            <div class="mock-line h-0.5 w-full opacity-40 mt-0.5"></div>
            <div class="flex justify-between mt-1">
              <div class="mock-line h-0.5 w-8 opacity-50"></div>
              <div class="mock-accent h-0.5 w-6 opacity-70"></div>
            </div>
          </div>
        </div>
        <p class="tcard-label text-center text-[12px] text-slate-600">Classic</p>
      </div>

      <!-- Modern card -->
      <div class="tcard rounded-xl border-2 border-slate-200 p-2.5 mb-3"
           id="tcard-modern" onclick="selectTemplate('modern')">
        <div class="bg-slate-50 rounded-lg p-2 mb-2">
          <div class="flex flex-col rounded-md overflow-hidden">
            <div class="px-1.5 py-1.5" style="background:#2c4a6e">
              <div class="flex justify-between items-center">
                <div class="h-1.5 w-10 rounded-sm bg-white opacity-90"></div>
                <div class="h-1 w-6 rounded-sm" style="background:#b8cfe8;opacity:.8"></div>
              </div>
              <div class="h-0.5 w-14 rounded-sm mt-0.5" style="background:#cbd5e1;opacity:.5"></div>
            </div>
            <div class="px-1.5 py-1.5 bg-white space-y-0.5">
              <div class="flex gap-1">
                <div class="mock-line h-0.5 flex-1 opacity-45"></div>
                <div class="mock-line h-0.5 w-4 opacity-45"></div>
                <div class="mock-accent h-0.5 w-5 opacity-70"></div>
              </div>
              <div class="flex gap-1">
                <div class="mock-line h-0.5 flex-1 opacity-40"></div>
                <div class="mock-line h-0.5 w-4 opacity-40"></div>
                <div class="mock-accent h-0.5 w-5 opacity-65"></div>
              </div>
              <div class="flex justify-end mt-1">
                <div class="mock-accent h-1 w-10 rounded-sm opacity-80"></div>
              </div>
            </div>
          </div>
        </div>
        <p class="tcard-label text-center text-[12px] text-slate-600">Modern</p>
      </div>
    </aside>

    <!-- Form panel -->
    <main class="flex-1 scrollpane">
      <form id="inv-form" class="p-5 space-y-5 max-w-xl">
        <input type="hidden" name="template" id="template-input" value="classic" />

        <!-- Sender Info -->
        <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
          <div class="px-5 py-3.5 border-b border-slate-100 flex items-center gap-2">
            <svg class="w-4 h-4 text-brand" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
            <h2 class="text-sm font-semibold text-slate-700">Sender Info</h2>
          </div>
          <div class="p-5 grid grid-cols-2 gap-3">
            <div class="col-span-2">
              <label class="field-label">Name / Business Name *</label>
              <input name="sender_name" required placeholder="Acme Studio" class="field-input" />
            </div>
            <div>
              <label class="field-label">Email *</label>
              <input name="sender_email" type="email" required placeholder="billing@acmestudio.com" class="field-input" />
            </div>
            <div>
              <label class="field-label">Phone</label>
              <input name="sender_phone" placeholder="+1 555 000 0000" class="field-input" />
            </div>
            <div class="col-span-2">
              <label class="field-label">Address</label>
              <input name="sender_address" placeholder="123 Main St, New York, NY 10001" class="field-input" />
            </div>
            <div>
              <label class="field-label">Website</label>
              <input name="sender_website" placeholder="acmestudio.com" class="field-input" />
            </div>
            <div>
              <label class="field-label">Tax / VAT ID</label>
              <input name="sender_tax_id" placeholder="US-12-3456789" class="field-input" />
            </div>
          </div>
        </div>

        <!-- Client Info -->
        <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
          <div class="px-5 py-3.5 border-b border-slate-100 flex items-center gap-2">
            <svg class="w-4 h-4 text-brand" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
            </svg>
            <h2 class="text-sm font-semibold text-slate-700">Client Info</h2>
          </div>
          <div class="p-5 grid grid-cols-2 gap-3">
            <div class="col-span-2">
              <label class="field-label">Client Name / Company *</label>
              <input name="client_name" required placeholder="Globex Corporation" class="field-input" />
            </div>
            <div>
              <label class="field-label">Email</label>
              <input name="client_email" type="email" placeholder="ap@globex.com" class="field-input" />
            </div>
            <div>
              <label class="field-label">Phone</label>
              <input name="client_phone" placeholder="+1 555 111 2222" class="field-input" />
            </div>
            <div class="col-span-2">
              <label class="field-label">Address</label>
              <input name="client_address" placeholder="456 Business Ave, Chicago, IL 60601" class="field-input" />
            </div>
          </div>
        </div>

        <!-- Invoice Details -->
        <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
          <div class="px-5 py-3.5 border-b border-slate-100 flex items-center gap-2">
            <svg class="w-4 h-4 text-brand" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
            </svg>
            <h2 class="text-sm font-semibold text-slate-700">Invoice Details</h2>
          </div>
          <div class="p-5 grid grid-cols-2 gap-3">
            <div>
              <label class="field-label">Invoice Number *</label>
              <input name="invoice_number" required placeholder="INV-0001" class="field-input" />
            </div>
            <div>
              <label class="field-label">Currency</label>
              <input name="currency" placeholder="USD" class="field-input" value="USD" />
            </div>
            <div>
              <label class="field-label">Invoice Date *</label>
              <input name="invoice_date" required placeholder="May 31, 2026" class="field-input" />
            </div>
            <div>
              <label class="field-label">Due Date *</label>
              <input name="due_date" required placeholder="June 30, 2026" class="field-input" />
            </div>
          </div>
        </div>

        <!-- Line Items -->
        <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
          <div class="px-5 py-3.5 border-b border-slate-100 flex items-center gap-2">
            <svg class="w-4 h-4 text-brand" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 10h16M4 14h16M4 18h16"/>
            </svg>
            <h2 class="text-sm font-semibold text-slate-700">Line Items</h2>
          </div>
          <div class="p-5">
            <table class="w-full" id="items-table">
              <thead>
                <tr>
                  <th class="text-left text-[11px] font-semibold uppercase tracking-wide text-slate-400 pb-2 border-b border-slate-100" style="width:52%">Description</th>
                  <th class="text-right text-[11px] font-semibold uppercase tracking-wide text-slate-400 pb-2 border-b border-slate-100 px-2" style="width:14%">Qty</th>
                  <th class="text-right text-[11px] font-semibold uppercase tracking-wide text-slate-400 pb-2 border-b border-slate-100 px-2" style="width:22%">Unit Price</th>
                  <th class="pb-2 border-b border-slate-100" style="width:12%"></th>
                </tr>
              </thead>
              <tbody id="items-tbody">
                <!-- rows injected by JS -->
              </tbody>
            </table>
            <button type="button" onclick="addItemRow()"
              class="mt-3 flex items-center gap-1.5 text-xs font-medium text-brand hover:text-brand/80 transition">
              <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
              </svg>
              Add item
            </button>
          </div>
        </div>

        <!-- Tax & Notes -->
        <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
          <div class="px-5 py-3.5 border-b border-slate-100 flex items-center gap-2">
            <svg class="w-4 h-4 text-brand" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A2 2 0 013 12V7a2 2 0 012-2h2z"/>
            </svg>
            <h2 class="text-sm font-semibold text-slate-700">Tax &amp; Notes</h2>
          </div>
          <div class="p-5 grid grid-cols-2 gap-3">
            <div>
              <label class="field-label">Tax Rate (%)</label>
              <input name="tax_rate" type="number" min="0" max="100" step="0.01" placeholder="0" class="field-input" value="0" />
            </div>
            <div>
              <label class="field-label">Discount (%)</label>
              <input name="discount_rate" type="number" min="0" max="100" step="0.01" placeholder="0" class="field-input" value="0" />
            </div>
            <div class="col-span-2">
              <label class="field-label">Notes / Payment Terms</label>
              <textarea name="notes" rows="3"
                placeholder="Payment due within 30 days. Bank transfer to…"
                class="field-input resize-none"></textarea>
            </div>
          </div>
        </div>

        <div class="h-6"></div>
      </form>
    </main>

    <!-- Preview panel -->
    <div class="w-[46%] shrink-0 flex flex-col border-l border-slate-200">
      <div class="bg-white border-b border-slate-200 px-4 py-2.5 flex items-center justify-between shrink-0">
        <span class="text-xs font-semibold uppercase tracking-widest text-slate-400">Preview</span>
        <span class="text-xs text-slate-400">Updates as you type</span>
      </div>
      <div id="preview-wrapper">
        <div id="preview-paper">
          <div class="preview-overlay" id="preview-overlay">
            <div class="flex flex-col items-center gap-2">
              <svg class="w-5 h-5 text-brand animate-spin" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
              </svg>
              <span class="text-xs text-slate-500">Updating…</span>
            </div>
          </div>
          <iframe id="preview-frame" sandbox="allow-same-origin"></iframe>
        </div>
      </div>
    </div>

  </div>

<script>
  const SAMPLE_HTML = {{ sample_html | tojson }};

  const previewFrame   = document.getElementById('preview-frame');
  const previewPaper   = document.getElementById('preview-paper');
  const previewOverlay = document.getElementById('preview-overlay');
  const statusEl       = document.getElementById('preview-status');

  const INVOICE_W = 794;
  function scalePreview() {
    const scale = previewPaper.clientWidth / INVOICE_W;
    previewFrame.style.transform = `scale(${scale})`;
    previewPaper.style.height = (previewFrame.offsetHeight * scale) + 'px';
  }
  new ResizeObserver(scalePreview).observe(previewPaper);
  previewFrame.addEventListener('load', scalePreview);
  previewFrame.srcdoc = SAMPLE_HTML;

  // --- Template selection ---
  function selectTemplate(name) {
    document.querySelectorAll('.tcard').forEach(c => c.classList.remove('active'));
    document.getElementById('tcard-' + name).classList.add('active');
    document.getElementById('template-input').value = name;
    scheduleUpdate();
  }

  // --- Debounced preview ---
  let debounceTimer;
  function scheduleUpdate() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(updatePreview, 600);
  }

  async function updatePreview() {
    previewOverlay.classList.add('visible');
    statusEl.classList.remove('hidden');
    try {
      const res = await fetch('/invoice/preview', { method: 'POST', body: new FormData(document.getElementById('inv-form')) });
      if (res.ok) previewFrame.srcdoc = await res.text();
    } catch (_) {}
    previewOverlay.classList.remove('visible');
    statusEl.classList.add('hidden');
  }

  document.getElementById('inv-form').addEventListener('input', scheduleUpdate);

  // --- Download ---
  async function downloadPDF() {
    const btn = document.getElementById('dl-btn');
    btn.disabled = true; btn.textContent = 'Generating…';
    try {
      const res = await fetch('/invoice/download', { method: 'POST', body: new FormData(document.getElementById('inv-form')) });
      if (res.ok) {
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        const num = (document.querySelector('input[name="invoice_number"]').value || 'invoice').replace(/\s+/g, '_');
        a.download = num + '.pdf';
        a.click();
        setTimeout(() => URL.revokeObjectURL(url), 2000);
      }
    } finally {
      btn.disabled = false;
      btn.innerHTML = `<svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg> Download PDF`;
    }
  }

  // --- Line items ---
  function addItemRow() {
    const tbody = document.getElementById('items-tbody');
    const tr = document.createElement('tr');
    tr.className = 'item-row';
    tr.innerHTML = `
      <td class="pr-2 py-1">
        <input name="item_desc" type="text" placeholder="Service or product description"
          class="field-input" style="min-width:0" />
      </td>
      <td class="px-2 py-1">
        <input name="item_qty" type="number" min="0" step="any" placeholder="1"
          class="field-input text-right" style="min-width:0" />
      </td>
      <td class="px-2 py-1">
        <input name="item_price" type="number" min="0" step="0.01" placeholder="0.00"
          class="field-input text-right" style="min-width:0" />
      </td>
      <td class="pl-2 py-1 text-center">
        <button type="button" class="remove-row-btn" onclick="removeItemRow(this)" title="Remove row">
          <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </td>
    `;
    tbody.appendChild(tr);
    tr.querySelector('input[name="item_desc"]').focus();
  }

  function removeItemRow(btn) {
    const tbody = document.getElementById('items-tbody');
    if (tbody.rows.length <= 1) return; // keep at least one row
    btn.closest('tr').remove();
    scheduleUpdate();
  }

  // Start with one empty row
  addItemRow();

  // --- Dark mode (syncs with localStorage key "theme") ---
  function applyTheme(t) {
    document.documentElement.classList.toggle('dark', t === 'dark');
    document.getElementById('theme-icon-moon').classList.toggle('hidden', t === 'dark');
    document.getElementById('theme-icon-sun').classList.toggle('hidden', t !== 'dark');
  }
  function toggleTheme() {
    const next = document.documentElement.classList.contains('dark') ? 'light' : 'dark';
    localStorage.setItem('theme', next); applyTheme(next);
  }
  applyTheme(localStorage.getItem('theme') || 'light');
</script>
</body>
</html>
