{% extends 'base.html' %}
{% block title %}Convert CSV{% endblock %}
{% block content %}
<div class="breadcrumb"><a href="/">Home</a><span class="sep">/</span><span>Convert CSV</span></div>
<div class="flex items-center gap-3 mb-6">
  <div class="w-10 h-10 rounded-xl flex items-center justify-center text-green-400" style="background:rgba(74,222,128,.1)">
    <i class="fa-solid fa-file-export"></i>
  </div>
  <div>
    <h1 class="page-title" style="margin-bottom:0">Convert CSV</h1>
    <p style="font-size:13px;color:var(--muted)">Export a CSV file as Excel (.xlsx) or JSON.</p>
  </div>
</div>
<div class="tool-page-card">
  <form id="tool-form" method="POST" enctype="multipart/form-data" class="space-y-4">
    <div>
      <label class="form-label">CSV File</label>
      <div class="file-zone">
        <input type="file" name="file" accept=".csv,.tsv" required>
        <i class="fa-solid fa-table text-2xl mb-1" style="color:var(--muted)"></i>
        <div class="text-xs mt-1" style="color:var(--muted)"><strong style="color:var(--accent)">Click to browse</strong> or drag &amp; drop</div>
      </div>
    </div>
    <div>
      <label class="form-label">Export As</label>
      <div class="grid grid-cols-2 gap-3">
        <label class="flex items-center gap-2 p-3 rounded-lg border cursor-pointer transition" style="border-color:var(--card-border)" id="opt-excel">
          <input type="radio" name="target" value="excel" checked class="w-4 h-4" style="accent-color:var(--accent)" onchange="highlightOpt()">
          <span><i class="fa-solid fa-file-excel mr-1.5" style="color:#1d6f42"></i><strong>Excel</strong> (.xlsx)</span>
        </label>
        <label class="flex items-center gap-2 p-3 rounded-lg border cursor-pointer transition" style="border-color:var(--card-border)" id="opt-json">
          <input type="radio" name="target" value="json" class="w-4 h-4" style="accent-color:var(--accent)" onchange="highlightOpt()">
          <span><i class="fa-solid fa-code mr-1.5" style="color:#f59e0b"></i><strong>JSON</strong></span>
        </label>
      </div>
    </div>
    <button type="submit" class="btn btn-primary btn-full"><i class="fa-solid fa-file-export"></i> Convert</button>
  </form>
</div>
<div id="loading-section" class="hidden tool-page-card text-center py-10">
  <div class="inline-block w-10 h-10 border-4 rounded-full animate-spin mb-4" style="border-color:var(--card-border);border-top-color:var(--accent)"></div>
  <p style="color:var(--muted);font-size:13px">Converting…</p>
</div>
<div id="result-section" class="hidden tool-page-card text-center py-8">
  <i class="fa-solid fa-check-circle text-3xl mb-3" style="color:var(--accent)"></i>
  <p class="font-medium mb-3" style="color:var(--text)">Ready!</p>
  <a id="download-link" href="#" class="btn btn-primary"><i class="fa-solid fa-download"></i> Download File</a>
</div>
<script>
function highlightOpt() {
  ['excel','json'].forEach(id => {
    const el = document.getElementById('opt-' + id);
    const checked = el.querySelector('input').checked;
    el.style.borderColor = checked ? 'var(--accent)' : 'var(--card-border)';
  });
}
highlightOpt();
const form = document.getElementById('tool-form');
form.addEventListener('submit', async function(e) {
  e.preventDefault();
  document.getElementById('loading-section').classList.remove('hidden');
  form.classList.add('hidden');
  const res = await fetch('/csv-convert', { method: 'POST', body: new FormData(form) });
  document.getElementById('loading-section').classList.add('hidden');
  if (res.ok) {
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const fmt = document.querySelector('input[name=target]:checked').value;
    document.getElementById('download-link').href = url;
    document.getElementById('download-link').download = 'converted.' + (fmt === 'excel' ? 'xlsx' : 'json');
    document.getElementById('result-section').classList.remove('hidden');
  } else {
    form.classList.remove('hidden');
    alert('Error: ' + await res.text());
  }
});
</script>
{% endblock %}
