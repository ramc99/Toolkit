{% extends 'base.html' %}
{% block title %}Split PDF{% endblock %}
{% block content %}

<div class="mb-6 flex items-center gap-2">
    <a href="/pdf/" class="text-sm text-gray-400 hover:text-[#4a6cf7] transition-colors"><i class="fa-solid fa-chevron-left mr-1 text-xs"></i>PDF Tools</a>
    <span class="text-gray-300 dark:text-gray-600">/</span>
    <span class="text-sm text-gray-600 dark:text-gray-300 font-medium">Split PDF</span>
</div>

<div class="max-w-xl">
    <h1 class="text-xl font-bold mb-1">Split PDF</h1>
    <p class="text-sm text-gray-500 dark:text-gray-400 mb-6">Split a PDF every N pages, or into custom page ranges. Downloads as a ZIP archive.</p>

    <form method="post" enctype="multipart/form-data"
          class="bg-white dark:bg-gray-800 border border-slate-200 dark:border-gray-700 rounded-2xl shadow-sm p-6 space-y-4">

        <div>
            <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-1.5">PDF File</label>
            <div class="file-zone">
                <input type="file" name="file" accept=".pdf" required>
                <div class="text-2xl text-gray-400 mb-1"><i class="fa-regular fa-file-pdf"></i></div>
                <div class="text-xs text-gray-400"><strong class="text-[#4a6cf7]">Click to browse</strong> or drag &amp; drop &mdash; .pdf only</div>
            </div>
            <p class="file-name text-xs text-gray-500 dark:text-gray-400 mt-1 min-h-4"></p>
        </div>

        <div>
            <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-2">Split Mode</label>
            <div class="flex gap-4 mb-3">
                <label class="flex items-center gap-2 text-sm cursor-pointer">
                    <input type="radio" name="mode" value="every" checked class="accent-[#4a6cf7]" id="mode-every"> Every N pages
                </label>
                <label class="flex items-center gap-2 text-sm cursor-pointer">
                    <input type="radio" name="mode" value="ranges" class="accent-[#4a6cf7]" id="mode-ranges"> Custom ranges
                </label>
            </div>

            <div id="field-every">
                <label class="block text-xs text-gray-500 dark:text-gray-400 mb-1">Pages per part</label>
                <input type="number" name="every" value="1" min="1"
                    class="w-full px-3 py-2 text-sm border border-slate-200 dark:border-gray-600 rounded-lg bg-slate-50 dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-[#4a6cf7]/30 focus:border-[#4a6cf7]">
            </div>

            <div id="field-ranges" class="hidden">
                <label class="block text-xs text-gray-500 dark:text-gray-400 mb-1">Page ranges (e.g. 1-3,4-7,8-10)</label>
                <input type="text" name="ranges" placeholder="1-3,4-7,8-10"
                    class="w-full px-3 py-2 text-sm border border-slate-200 dark:border-gray-600 rounded-lg bg-slate-50 dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-[#4a6cf7]/30 focus:border-[#4a6cf7]">
            </div>
        </div>

        <button type="submit" class="btn btn-primary btn-full">
            <i class="fa-solid fa-scissors"></i> Split PDF
        </button>
    </form>
</div>

<script>
document.querySelectorAll('input[name="mode"]').forEach(r => {
    r.addEventListener('change', () => {
        const every = document.getElementById('mode-every').checked;
        document.getElementById('field-every').classList.toggle('hidden', !every);
        document.getElementById('field-ranges').classList.toggle('hidden', every);
    });
});
</script>
{% endblock %}
