{# Shared before/after comparison panel — included in all image tool pages #}

<!-- Before preview — shows as soon as a file is selected -->
<div id="before-section" class="hidden mt-4 tool-page-card" style="max-width:none">
    <div class="text-xs font-semibold mb-3 uppercase tracking-wide" style="color:var(--muted)">
        <i class="fa-regular fa-image mr-1"></i> Before
    </div>
    <div class="rounded-lg overflow-hidden flex items-center justify-center" style="background:rgba(0,0,0,.05);min-height:180px">
        <img id="img-before" src="" alt="Original" class="max-w-full max-h-64 object-contain rounded">
    </div>
    <div class="text-xs mt-2" style="color:var(--muted)" id="foot-before">—</div>
</div>

<!-- After + stats — shows only after processing -->
<div id="result-section" class="hidden mt-4 space-y-4">

    <!-- Stats bar -->
    <div class="tool-page-card" style="max-width:none">
        <div class="flex items-center gap-4 flex-wrap">
            <div class="text-center">
                <div class="text-xs mb-0.5" style="color:var(--muted)">Original</div>
                <div class="font-semibold" style="font-size:15px" id="stat-orig-size">—</div>
                <div class="text-xs" style="color:var(--muted)" id="stat-orig-dims">—</div>
            </div>
            <div style="color:var(--muted)" class="text-xl flex-1 text-center">→</div>
            <div class="text-center">
                <div class="text-xs mb-0.5" style="color:var(--muted)">Result</div>
                <div class="font-semibold text-green-400" style="font-size:15px" id="stat-result-size">—</div>
                <div class="text-xs" style="color:var(--muted)" id="stat-result-dims">—</div>
            </div>
            <div id="stat-badge" class="ml-auto px-3 py-1 rounded-full text-xs font-bold hidden" style="background:rgba(34,197,94,.12);color:#4ade80;border:1px solid rgba(34,197,94,.25)"></div>
        </div>
    </div>

    <!-- After image -->
    <div class="tool-page-card" style="max-width:none">
        <div class="text-xs font-semibold mb-3 uppercase tracking-wide" style="color:#4ade80">
            <i class="fa-solid fa-check-circle mr-1"></i> After
        </div>
        <div class="rounded-lg overflow-hidden flex items-center justify-center" style="background:rgba(0,0,0,.05);min-height:180px">
            <img id="img-after" src="" alt="Result" class="max-w-full max-h-64 object-contain rounded">
        </div>
        <div class="text-xs mt-2" style="color:var(--muted)" id="foot-after">—</div>
    </div>

    <!-- Actions -->
    <div class="flex gap-3 flex-wrap">
        <a id="download-btn" href="#" download class="btn btn-primary">
            <i class="fa-solid fa-download"></i> Download Result
        </a>
        <button id="reset-btn" class="btn" style="background:var(--card-border);color:var(--text)">
            <i class="fa-solid fa-rotate-left"></i> Process Another
        </button>
    </div>
</div>
