{% extends 'base.html' %}
{% block title %}OCR Result{% endblock %}
{% block content %}

<div class="mb-6 flex items-center gap-2">
    <a href="{{ url_for('pdf_toolkit.ocr') }}" class="text-sm text-gray-400 hover:text-[#4a6cf7] transition-colors"><i class="fa-solid fa-chevron-left mr-1 text-xs"></i>Back to OCR</a>
</div>

<div class="max-w-3xl">
    <h1 class="text-xl font-bold mb-1">OCR Result</h1>
    <p class="text-sm text-gray-500 dark:text-gray-400 mb-6">Extracted text from <strong>{{ filename }}</strong></p>

    <div class="bg-white dark:bg-gray-800 border border-slate-200 dark:border-gray-700 rounded-2xl shadow-sm p-6">
        <pre class="text-sm text-gray-700 dark:text-gray-300 whitespace-pre-wrap leading-relaxed font-mono">{{ text }}</pre>
    </div>

    <a href="{{ url_for('pdf_toolkit.ocr') }}" class="btn btn-primary mt-4 inline-flex">
        <i class="fa-solid fa-rotate-left"></i> Run another OCR
    </a>
</div>
{% endblock %}
